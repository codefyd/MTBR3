<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; font-src 'self' https://cdnjs.cloudflare.com data:; img-src 'self' data:; connect-src 'self' https://gaermmsfbtfcghegdkmq.supabase.co https://*.supabase.co wss://*.supabase.co; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ملفات المتبرعين | منصة ولاء</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <div class="app-shell" id="shell"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="assets/config.js"></script>
  <script src="assets/app.js"></script>
  <script>
    const DAY_COLS = [
      { key:'sat_count', label:'السبت' }, { key:'sun_count', label:'الأحد' },
      { key:'mon_count', label:'الاثنين' }, { key:'tue_count', label:'الثلاثاء' },
      { key:'wed_count', label:'الأربعاء' }, { key:'thu_count', label:'الخميس' },
      { key:'fri_count', label:'الجمعة' },
    ];
    const PERIOD_COLS = [
      { key:'period_morning', label:'4ص–11:59ص' }, { key:'period_noon', label:'12م–3م' },
      { key:'period_evening', label:'4م–6:59م' }, { key:'period_night', label:'7م–3:59ص' },
    ];

    let page = 0, count = 0, categories = [], projectsList = [], showAdvanced = false;
    // حالة الترتيب حسب رأس العمود
    let sortCol = 'total_amount', sortAsc = false;
    const SORTABLE = {
      donor_name:1, phone:1, phone_status:1, first_donation:1, last_donation:1,
      total_amount:1, donations_count:1, status:1, category:1,
      sat_count:1, sun_count:1, mon_count:1, tue_count:1, wed_count:1, thu_count:1, fri_count:1,
      period_morning:1, period_noon:1, period_evening:1, period_night:1,
      targeted_count:1, last_targeted:1, responded:1, response_date:1,
    };
    // الفلاتر متعددة الاختيار + حدّ أدنى لعدد مرات اليوم/الفترة
    const f = {
      search:'', statuses:[], cats:[], projects:[], minCount:'', maxCount:'', minTotal:'',
      targeted:'', lastBefore:'', lastAfter:'', responded:'',
      days:[], dayMin:'', periods:[], periodMin:'',
    };

    // الحصالة: مجموعة أرقام محفوظة بالمتصفح + سجل دفعات للتراجع عن آخر إضافة
    const JAR_KEY = 'donor_jar_v1';
    const JAR_BATCHES_KEY = 'donor_jar_batches_v1';
    let jar = loadJar();
    let jarBatches = loadBatches(); // مصفوفة: كل عنصر = مصفوفة الأرقام التي أضافتها تلك الدفعة (الجديدة فقط)
    function loadJar() {
      try { return new Set(JSON.parse(localStorage.getItem(JAR_KEY) || '[]')); }
      catch { return new Set(); }
    }
    function loadBatches() {
      try { return JSON.parse(localStorage.getItem(JAR_BATCHES_KEY) || '[]'); }
      catch { return []; }
    }
    function saveJar() {
      localStorage.setItem(JAR_KEY, JSON.stringify([...jar]));
      localStorage.setItem(JAR_BATCHES_KEY, JSON.stringify(jarBatches));
      updateJarUI();
    }

    (async () => {
      const session = await App.initShell('donors.html');
      if (!session) return;
      const { data: s } = await App.sb.from('settings').select('categories').eq('id', 1).single();
      categories = (s?.categories || []).map(c => c.name);
      // نعرض الصفحة وجدول المتبرعين أولًا، ثم نحمل قائمة المشاريع لاحقًا لأنها تُفحص من جدول العمليات وقد تكون أثقل.
      renderPage();
      load();
      loadKpis();
      fetchProjects().then(list => { projectsList = list; renderProjectsOptions(); }).catch(() => {});
    })();

    // جلب قائمة المشاريع الفريدة من العمليات (لقائمة الفلتر)
    async function fetchProjects() {
      // أسرع مسار: دالة قاعدة بيانات ترجع المشاريع الفريدة مباشرة.
      const rpc = await App.sb.rpc('operations_projects');
      if (!rpc.error && Array.isArray(rpc.data)) return rpc.data;

      // مسار احتياطي إذا لم تُشغّل تحديثات SQL بعد.
      const set = new Set();
      const CHUNK = 1000;
      let from = 0, done = false, guard = 0;
      while (!done && guard < 50) {
        const { data, error } = await App.sb.from('operations').select('project').not('project','is',null).range(from, from + CHUNK - 1);
        if (error) break;
        (data || []).forEach(r => { const p = (r.project || '').trim(); if (p) set.add(p); });
        if (!data || data.length < CHUNK) done = true; else from += CHUNK;
        guard++;
      }
      return [...set].sort((a,b) => a.localeCompare(b,'ar'));
    }

    function renderPage() {
      const catOpts = categories.map(c => `<option value="${App.esc(c)}">${App.esc(c)}</option>`).join('');
      const dayOpts = DAY_COLS.map(d => `<option value="${d.key}">${d.label}</option>`).join('');
      const periodOpts = PERIOD_COLS.map(d => `<option value="${d.key}">${d.label}</option>`).join('');

      document.getElementById('mainArea').innerHTML = `
        <div class="topbar">
          <h1><i class="fa-solid fa-users text-gold"></i> ملفات المتبرعين</h1>
          <button class="btn-x btn-gold btn-sm" id="recalcBtn"><i class="fa-solid fa-rotate"></i> إعادة احتساب الملفات</button>
        </div>
        <div class="content">
          <div class="row g-3 fade-in" style="margin-bottom:1.5rem">
            <div class="col-6 col-xl"><div class="kpi-card"><div class="kpi-icon"><i class="fa-solid fa-user-group"></i></div><div class="kpi-label">إجمالي المتبرعين</div><div class="kpi-value" id="kpiTotal">—</div></div></div>
            <div class="col-6 col-xl"><div class="kpi-card"><div class="kpi-icon" style="background:#dff3eb;color:var(--c-success)"><i class="fa-solid fa-phone-circle-check"></i></div><div class="kpi-label">أرقام صحيحة</div><div class="kpi-value" id="kpiValidPhones">—</div></div></div>
            <div class="col-6 col-xl"><div class="kpi-card"><div class="kpi-icon" style="background:#dff3eb;color:var(--c-success)"><i class="fa-solid fa-heart-pulse"></i></div><div class="kpi-label">مستمرون</div><div class="kpi-value" id="kpiActive">—</div></div></div>
            <div class="col-6 col-xl"><div class="kpi-card"><div class="kpi-icon" style="background:#f6e3e0;color:var(--c-danger)"><i class="fa-solid fa-moon"></i></div><div class="kpi-label">خاملون</div><div class="kpi-value" id="kpiInactive">—</div></div></div>
            <div class="col-6 col-xl"><div class="kpi-card gold"><div class="kpi-icon"><i class="fa-solid fa-sack-dollar"></i></div><div class="kpi-label">إجمالي التبرعات</div><div class="kpi-value" id="kpiSum">—</div></div></div>
          </div>

          <!-- شريط الحصالة -->
          <div class="jar-bar fade-in">
            <i class="fa-solid fa-piggy-bank" style="font-size:1.4rem;color:var(--c-gold)"></i>
            <strong>الحصالة</strong>
            <span class="jar-count" id="jarCount">0</span>
            <span class="muted" style="font-size:.9rem">متبرع مجمّع</span>
            <div style="flex:1"></div>
            <button class="btn-x btn-gold btn-sm" id="addToJar"><i class="fa-solid fa-plus"></i> أضف نتائج الفلتر الحالي</button>
            <button class="btn-x btn-ghost btn-sm" id="undoJar" title="تراجع عن آخر إضافة"><i class="fa-solid fa-rotate-left"></i> تراجع</button>
            <button class="btn-x btn-ghost btn-sm" id="clearJar" title="تفريغ الحصالة"><i class="fa-solid fa-broom"></i> تفريغ</button>
            <button class="btn-x btn-ghost btn-sm" id="viewJar"><i class="fa-solid fa-eye"></i> عرض / تصدير</button>
          </div>

          <div class="panel fade-in" style="margin-bottom:1.5rem">
            <div class="panel-head">
              <h2><i class="fa-solid fa-filter"></i> الفلترة</h2>
              <div style="display:flex;gap:.5rem">
                <button class="btn-x btn-ghost btn-sm" id="toggleAdv"><i class="fa-solid fa-sliders"></i> فلترة متقدمة</button>
                <button class="btn-x btn-ghost btn-sm" id="resetBtn"><i class="fa-solid fa-eraser"></i> تصفير</button>
              </div>
            </div>
            <div class="panel-body">
              <!-- مجموعة 1: البحث والتصنيف الأساسي -->
              <div class="row g-3">
                <div class="col-12">
                  <label class="lbl">بحث (اسم / جوال)</label>
                  <input class="field" id="fSearch" placeholder="اكتب اسمًا أو رقم جوال..." />
                </div>
                <div class="col-12 col-md-6">
                  <label class="lbl">حالة العميل <span class="muted">(تحديد متعدد)</span></label>
                  <div class="chip-group" id="grpStatus">
                    <button type="button" class="chip-toggle" data-v="مستمر">مستمر</button>
                    <button type="button" class="chip-toggle" data-v="خامل">خامل</button>
                  </div>
                </div>
                <div class="col-12 col-md-6">
                  <label class="lbl">فئة العميل <span class="muted">(تحديد متعدد)</span></label>
                  <div class="chip-group" id="grpCat">
                    ${categories.map(c => `<button type="button" class="chip-toggle" data-v="${App.esc(c)}">${App.esc(c)}</button>`).join('')}
                  </div>
                </div>
                <div class="col-12">
                  <label class="lbl">المشاريع <span class="muted">(اختيار متعدد — دعم أيٍّ منها)</span></label>
                  <div class="multi-dd" id="ddProjects">
                    <button type="button" class="field multi-dd-toggle" id="ddProjBtn">
                      <span class="ph" id="ddProjLabel">كل المشاريع</span>
                      <i class="fa-solid fa-chevron-down"></i>
                    </button>
                    <div class="multi-dd-panel hidden" id="ddProjPanel">
                      <input type="text" class="field multi-dd-search" id="ddProjSearch" placeholder="بحث في المشاريع..." />
                      <div id="ddProjOpts">
                        ${projectsList.length
                          ? projectsList.map(p => `<label class="multi-dd-opt"><input type="checkbox" value="${App.esc(p)}" />${App.esc(p)}</label>`).join('')
                          : '<div class="muted" style="padding:.5rem">جارٍ تحميل المشاريع بعد عرض الملفات…</div>'}
                      </div>
                    </div>
                  </div>
                </div>
              </div>

              <!-- مجموعة 2: الفلترة المتقدمة -->
              <div class="${showAdvanced ? '' : 'hidden'}" id="advRow" style="margin-top:1.25rem;padding-top:1.25rem;border-top:1px dashed var(--c-line)">
                <!-- 2-أ: نطاقات عددية ومالية -->
                <div class="row g-3">
                  <div class="col-6 col-md-3"><label class="lbl">عدد التبرعات (من)</label><input type="number" class="field" id="fMinCount" /></div>
                  <div class="col-6 col-md-3"><label class="lbl">عدد التبرعات (إلى)</label><input type="number" class="field" id="fMaxCount" /></div>
                  <div class="col-6 col-md-3"><label class="lbl">إجمالي التبرعات (أكثر من)</label><input type="number" class="field" id="fMinTotal" /></div>
                  <div class="col-6 col-md-3"><label class="lbl">الاستهداف في حملة</label>
                    <select class="field" id="fTargeted"><option value="">الكل</option><option value="yes">تم استهدافه</option><option value="no">لم يُستهدف</option></select></div>
                  <div class="col-6 col-md-3"><label class="lbl">الاستجابة للحملة</label>
                    <select class="field" id="fResponded"><option value="">الكل</option><option value="yes">استجاب</option><option value="no">لم يستجب</option></select></div>
                </div>
                <!-- 2-ب: نطاق آخر تبرع -->
                <div class="row g-3" style="margin-top:.25rem">
                  <div class="col-6 col-md-3"><label class="lbl">آخر تبرع بعد</label><input type="date" class="field" id="fLastAfter" /></div>
                  <div class="col-6 col-md-3"><label class="lbl">آخر تبرع قبل</label><input type="date" class="field" id="fLastBefore" /></div>
                </div>
                <!-- 2-ج: أيام وأوقات التبرع -->
                <div class="row g-3" style="margin-top:.25rem">
                  <div class="col-12 col-md-6">
                    <label class="lbl">يوم التبرع <span class="muted">(تحديد متعدد — تبرّع في أيٍّ منها)</span></label>
                    <div class="chip-group" id="grpDays">
                      ${DAY_COLS.map(d => `<button type="button" class="chip-toggle" data-v="${d.key}">${d.label}</button>`).join('')}
                    </div>
                    <div style="margin-top:.5rem;max-width:220px">
                      <label class="lbl">تبرّع أكثر من (عدد مرات ≥)</label>
                      <input type="number" min="1" class="field" id="fDayMin" placeholder="مثال: 2" />
                    </div>
                  </div>
                  <div class="col-12 col-md-6">
                    <label class="lbl">فترة التبرع <span class="muted">(تحديد متعدد — تبرّع في أيٍّ منها)</span></label>
                    <div class="chip-group" id="grpPeriods">
                      ${PERIOD_COLS.map(d => `<button type="button" class="chip-toggle" data-v="${d.key}">${d.label}</button>`).join('')}
                    </div>
                    <div style="margin-top:.5rem;max-width:220px">
                      <label class="lbl">تبرّع أكثر من (عدد مرات ≥)</label>
                      <input type="number" min="1" class="field" id="fPeriodMin" placeholder="مثال: 2" />
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div class="panel fade-in">
            <div class="panel-head"><h2>قائمة المتبرعين <span class="muted" id="cnt" style="font-size:.9rem;font-weight:400"></span></h2></div>
            <div class="panel-body"><div id="tableArea"></div></div>
          </div>
        </div>`;

      wireControls();
      updateJarUI();
    }

    function wireControls() {
      document.getElementById('recalcBtn').addEventListener('click', recalc);
      document.getElementById('toggleAdv').addEventListener('click', () => {
        showAdvanced = !showAdvanced;
        document.getElementById('advRow').classList.toggle('hidden', !showAdvanced);
      });
      document.getElementById('resetBtn').addEventListener('click', resetFilters);

      // الحصالة
      document.getElementById('addToJar').addEventListener('click', addCurrentFilterToJar);
      document.getElementById('viewJar').addEventListener('click', openJarModal);
      document.getElementById('undoJar').addEventListener('click', undoLastJar);
      document.getElementById('clearJar').addEventListener('click', clearJar);

      const bind = (id, key, immediate) => {
        const el = document.getElementById(id);
        const handler = () => { f[key] = el.value; page = 0; load(); };
        if (immediate) {
          let t; el.addEventListener('input', () => { clearTimeout(t); t = setTimeout(handler, 350); });
        } else {
          el.addEventListener('change', handler);
        }
      };
      bind('fSearch', 'search', true);
      bind('fMinCount', 'minCount', true); bind('fMaxCount', 'maxCount', true);
      bind('fMinTotal', 'minTotal', true);
      bind('fTargeted', 'targeted');
      bind('fResponded', 'responded');
      bind('fLastAfter', 'lastAfter'); bind('fLastBefore', 'lastBefore');
      bind('fDayMin', 'dayMin', true); bind('fPeriodMin', 'periodMin', true);

      // مجموعات التحديد المتعدد
      wireChipGroup('grpStatus', 'statuses');
      wireChipGroup('grpCat', 'cats');
      wireChipGroup('grpDays', 'days');
      wireChipGroup('grpPeriods', 'periods');

      // قائمة المشاريع المنسدلة متعددة الاختيار
      wireProjectsDropdown();
    }

    function wireProjectsDropdown() {
      const btn = document.getElementById('ddProjBtn');
      const panel = document.getElementById('ddProjPanel');
      const search = document.getElementById('ddProjSearch');
      if (!btn) return;
      btn.addEventListener('click', (e) => { e.stopPropagation(); panel.classList.toggle('hidden'); });
      panel.addEventListener('click', (e) => e.stopPropagation());
      document.addEventListener('click', () => panel.classList.add('hidden'));
      search.addEventListener('input', () => {
        const q = search.value.trim();
        panel.querySelectorAll('.multi-dd-opt').forEach(o => {
          o.style.display = o.textContent.includes(q) ? '' : 'none';
        });
      });
      panel.querySelectorAll('input[type=checkbox]').forEach(cb => {
        cb.addEventListener('change', () => {
          f.projects = [...panel.querySelectorAll('input[type=checkbox]:checked')].map(x => x.value);
          updateProjLabel();
          page = 0; load();
        });
      });
    }
    function updateProjLabel() {
      const lbl = document.getElementById('ddProjLabel');
      if (!lbl) return;
      lbl.textContent = f.projects.length ? `${f.projects.length} مشروع محدد` : 'كل المشاريع';
      lbl.classList.toggle('ph', f.projects.length === 0);
    }

    function renderProjectsOptions() {
      const opts = document.getElementById('ddProjOpts');
      if (!opts) return;
      opts.innerHTML = projectsList.length
        ? projectsList.map(p => `<label class="multi-dd-opt"><input type="checkbox" value="${App.esc(p)}" ${f.projects.includes(p) ? 'checked' : ''} />${App.esc(p)}</label>`).join('')
        : '<div class="muted" style="padding:.5rem">لا توجد مشاريع بعد. ارفع عمليات أولاً.</div>';
      opts.querySelectorAll('input[type=checkbox]').forEach(cb => {
        cb.addEventListener('change', () => {
          f.projects = [...opts.querySelectorAll('input[type=checkbox]:checked')].map(x => x.value);
          updateProjLabel();
          page = 0; load();
        });
      });
    }

    function wireChipGroup(groupId, key) {
      const grp = document.getElementById(groupId);
      if (!grp) return;
      grp.querySelectorAll('.chip-toggle').forEach(btn => {
        btn.addEventListener('click', () => {
          const v = btn.dataset.v;
          const i = f[key].indexOf(v);
          if (i >= 0) { f[key].splice(i, 1); btn.classList.remove('on'); }
          else { f[key].push(v); btn.classList.add('on'); }
          page = 0; load();
        });
      });
    }

    function resetFilters() {
      f.search = ''; f.minCount = ''; f.maxCount = ''; f.minTotal = '';
      f.targeted = ''; f.lastAfter = ''; f.lastBefore = ''; f.dayMin = ''; f.periodMin = ''; f.responded = '';
      f.statuses = []; f.cats = []; f.days = []; f.periods = []; f.projects = [];
      ['fSearch','fMinCount','fMaxCount','fMinTotal','fTargeted','fResponded','fLastAfter','fLastBefore','fDayMin','fPeriodMin']
        .forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });
      document.querySelectorAll('.chip-toggle.on').forEach(b => b.classList.remove('on'));
      document.querySelectorAll('#ddProjPanel input[type=checkbox]:checked').forEach(cb => cb.checked = false);
      updateProjLabel();
      page = 0; load();
    }

    async function recalc() {
      const btn = document.getElementById('recalcBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-x" style="border-color:rgba(10,70,64,.3);border-top-color:var(--c-primary-dk)"></span> جارٍ الاحتساب...';
      try {
        await App.rebuildDonorsInBatches(({ total, processed }) => {
          const pct = total ? Math.min(100, Math.round((processed / total) * 100)) : 100;
          btn.innerHTML = `<span class="spinner-x" style="border-color:rgba(10,70,64,.3);border-top-color:var(--c-primary-dk)"></span> جارٍ الاحتساب... ${pct}%`;
        });
        App.toast('تمت إعادة احتساب ملفات المتبرعين.', 'ok');
        load(); loadKpis();
      } catch (error) {
        App.toast(error.message || 'تعذر إعادة الاحتساب', 'err');
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fa-solid fa-rotate"></i> إعادة احتساب الملفات';
      }
    }

    // يطبّق الفلاتر على استعلام معطى (يُستخدم للجدول وللحصالة)
    function buildQuery(q) {
      if (f.search) { const s = App.escFilter(f.search); if (s) q = q.or(`phone.ilike.%${s}%,phone_raw.ilike.%${s}%,phone_status.ilike.%${s}%,donor_name.ilike.%${s}%`); }
      if (f.statuses.length) q = q.in('status', f.statuses);
      if (f.cats.length) q = q.in('category', f.cats);
      // المشاريع: تطابق "أيٍّ منها" => overlaps على مصفوفة projects
      if (f.projects.length) q = q.overlaps('projects', f.projects);
      if (f.minCount !== '') q = q.gte('donations_count', Number(f.minCount));
      if (f.maxCount !== '') q = q.lte('donations_count', Number(f.maxCount));
      if (f.minTotal !== '') q = q.gte('total_amount', Number(f.minTotal));
      if (f.targeted === 'yes') q = q.gt('targeted_count', 0);
      if (f.targeted === 'no') q = q.eq('targeted_count', 0);
      if (f.responded === 'yes') q = q.eq('responded', true);
      if (f.responded === 'no') { q = q.gt('targeted_count', 0); q = q.eq('responded', false); }
      if (f.lastAfter) q = q.gte('last_donation', new Date(f.lastAfter).toISOString());
      if (f.lastBefore) q = q.lt('last_donation', new Date(f.lastBefore).toISOString());
      // الأيام: تبرّع في أيٍّ منها بعدد مرات ≥ الحد (افتراضي 1)
      const dayThr = f.dayMin !== '' && Number(f.dayMin) > 0 ? Number(f.dayMin) : 1;
      if (f.days.length) q = q.or(f.days.map(c => `${c}.gte.${dayThr}`).join(','));
      // الفترات: نفس المنطق
      const perThr = f.periodMin !== '' && Number(f.periodMin) > 0 ? Number(f.periodMin) : 1;
      if (f.periods.length) q = q.or(f.periods.map(c => `${c}.gte.${perThr}`).join(','));
      return q;
    }

    async function loadKpis() {
      const { data, error } = await App.sb.rpc('donors_fast_summary');
      if (error) { App.toast(error.message, 'err'); }
      const k = data || {};
      document.getElementById('kpiTotal').textContent = App.fmtNum(k.total_donors || 0);
      document.getElementById('kpiValidPhones').textContent = App.fmtNum(k.valid_phones || 0);
      document.getElementById('kpiActive').textContent = App.fmtNum(k.active_donors || 0);
      document.getElementById('kpiInactive').textContent = App.fmtNum(k.inactive_donors || 0);
      document.getElementById('kpiSum').textContent = App.fmtMoney(k.total_amount || 0);
    }

    async function load() {
      const area = document.getElementById('tableArea');
      area.innerHTML = '<div class="center-load"><div class="spinner-x spinner-dark" style="width:32px;height:32px"></div></div>';

      let q = App.sb.from('donors').select('phone,phone_raw,phone_status,phone_issue,donor_name,first_donation,last_donation,total_amount,donations_count,projects,status,category,sat_count,sun_count,mon_count,tue_count,wed_count,thu_count,fri_count,period_morning,period_noon,period_evening,period_night,no_time_count,targeted_count,last_targeted,responded,response_date,response_lag_days', { count:'estimated' })
        .order(sortCol, { ascending: sortAsc, nullsFirst: false })
        .range(page * App.PAGE_SIZE, page * App.PAGE_SIZE + App.PAGE_SIZE - 1);
      q = buildQuery(q);
      const { data, count:c, error } = await q;
      if (error) { area.innerHTML = `<div class="empty-state">${App.esc(error.message)}</div>`; return; }
      count = c || 0;
      document.getElementById('cnt').textContent = `(${App.fmtNum(count)} نتيجة تقريبية)`;

      if (!data.length) {
        area.innerHTML = '<div class="empty-state"><i class="fa-regular fa-folder-open"></i>لا توجد ملفات متبرعين مطابقة.</div>';
        return;
      }

      // رأس عمود قابل للترتيب
      const sortableTh = (key, label, extraCls='') => {
        const sorted = sortCol === key;
        const ind = sorted ? (sortAsc ? 'fa-arrow-up-long' : 'fa-arrow-down-long') : 'fa-sort';
        return `<th class="sortable ${sorted?'sorted':''} ${extraCls}" data-sort="${key}">${label}<i class="fa-solid ${ind} sort-ind"></i></th>`;
      };

      const dayTh = DAY_COLS.map(d => sortableTh(d.key, d.label, 'col-day')).join('');
      const periodTh = PERIOD_COLS.map(d => sortableTh(d.key, d.label, 'col-period')).join('');

      const rowsHtml = data.map(r => {
        const projects = (r.projects || []);
        // المشاريع مطوية: زر يفتح نافذة بكل المشاريع
        const projCell = projects.length
          ? `<button class="proj-trigger" data-proj="${App.esc(r.phone)}"><i class="fa-solid fa-list"></i> ${App.fmtNum(projects.length)} مشروع</button>`
          : '<span class="muted">—</span>';
        const dayTd = DAY_COLS.map(d => `<td class="col-day">${App.fmtNum(r[d.key] || 0)}</td>`).join('');
        const periodTd = PERIOD_COLS.map(d => `<td class="col-period">${App.fmtNum(r[d.key] || 0)}</td>`).join('');
        const statusBadge = r.status === 'مستمر' ? 'badge-active' : 'badge-inactive';
        const phoneStatus = r.phone_status || 'صحيح';
        const phoneBadge = phoneStatus === 'صحيح' ? 'badge-active' : phoneStatus === 'فارغ' ? 'badge-cat' : 'badge-inactive';
        const shownPhone = phoneStatus === 'صحيح' ? r.phone : (r.phone_raw || '—');
        return `<tr>
          <td>${App.esc(r.donor_name) || '—'}</td>
          <td dir="ltr">${App.esc(shownPhone)}</td>
          <td><span class="badge-x ${phoneBadge}">${App.esc(phoneStatus)}</span>${r.phone_issue ? `<div class="muted" style="font-size:.72rem;margin-top:.2rem">${App.esc(r.phone_issue)}</div>` : ''}</td>
          <td>${App.fmtDate(r.first_donation)}</td>
          <td>${App.fmtDate(r.last_donation)}</td>
          <td style="font-weight:700">${App.fmtMoney(r.total_amount)}</td>
          <td>${App.fmtNum(r.donations_count)}${r.no_time_count ? `<i class="fa-solid fa-clock muted" title="منها ${App.fmtNum(r.no_time_count)} بلا تاريخ/وقت — لا تظهر في تحليل الأيام والأوقات" style="font-size:.7rem;margin-inline-start:.3rem;opacity:.6"></i>` : ''}</td>
          <td class="projects-cell" data-projlist='${App.esc(JSON.stringify(projects))}' data-name="${App.esc(r.donor_name||'')}">${projCell}</td>
          <td><span class="badge-x ${statusBadge}">${App.esc(r.status) || '—'}</span></td>
          <td><span class="badge-x badge-cat">${App.esc(r.category) || '—'}</span></td>
          ${dayTd}${periodTd}
          <td>${App.fmtNum(r.targeted_count || 0)}</td>
          <td>${App.fmtDate(r.last_targeted)}</td>
          <td>${r.targeted_count ? `<span class="badge-x ${r.responded ? 'badge-active' : 'badge-inactive'}">${r.responded ? 'استجاب' : 'لم يستجب'}</span>${r.responded && r.response_lag_days != null ? `<div class="muted" style="font-size:.72rem;margin-top:.2rem">خلال ${App.fmtNum(r.response_lag_days)} يوم</div>` : ''}` : '<span class="muted">—</span>'}</td>
          <td>${App.fmtDate(r.response_date)}</td>
        </tr>`;
      }).join('');

      const pages = Math.ceil(count / App.PAGE_SIZE);
      area.innerHTML = `
        <div class="table-wrap"><table class="data donors-table">
          <thead><tr>
            ${sortableTh('donor_name','الاسم')}${sortableTh('phone','الجوال')}${sortableTh('phone_status','حالة الرقم')}
            ${sortableTh('first_donation','أول تبرع')}${sortableTh('last_donation','آخر تبرع')}
            ${sortableTh('total_amount','الإجمالي')}${sortableTh('donations_count','العدد')}
            <th>المشاريع</th>
            ${sortableTh('status','الحالة')}${sortableTh('category','الفئة')}
            ${dayTh}${periodTh}
            ${sortableTh('targeted_count','مرات الاستهداف')}${sortableTh('last_targeted','آخر استهداف')}
            ${sortableTh('responded','الاستجابة')}${sortableTh('response_date','تاريخ الاستجابة')}
          </tr></thead>
          <tbody>${rowsHtml}</tbody>
        </table></div>
        ${pagerHtml(pages)}`;
      wirePager(pages);
      wireSort();
      wireProjectCells();
    }

    // النقر على رأس عمود: نفس العمود يبدّل الاتجاه، عمود جديد يبدأ تنازليًا
    function wireSort() {
      document.querySelectorAll('th.sortable').forEach(th => {
        th.addEventListener('click', () => {
          const key = th.dataset.sort;
          if (sortCol === key) { sortAsc = !sortAsc; }
          else { sortCol = key; sortAsc = false; }
          page = 0; load();
        });
      });
    }

    // النقر على خلية المشاريع يفتح نافذة بكل مشاريع المتبرع
    function wireProjectCells() {
      document.querySelectorAll('.proj-trigger').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const cell = e.currentTarget.closest('.projects-cell');
          let list = [];
          try { list = JSON.parse(cell.dataset.projlist || '[]'); } catch {}
          openProjectsModal(cell.dataset.name || '', list);
        });
      });
    }

    function openProjectsModal(name, projects) {
      const back = document.createElement('div');
      back.className = 'modal-back';
      const chips = projects.map(p => `<span class="chip" style="font-size:.92rem;padding:.3rem .7rem;margin:.2rem">${App.esc(p)}</span>`).join('');
      back.innerHTML = `
        <div class="modal-box" style="max-width:520px">
          <div class="panel-head">
            <h2><i class="fa-solid fa-list text-gold"></i> مشاريع ${App.esc(name) || 'المتبرع'} <span class="muted" style="font-weight:400;font-size:.9rem">(${App.fmtNum(projects.length)})</span></h2>
            <button class="btn-x btn-ghost btn-sm" id="pjClose"><i class="fa-solid fa-xmark"></i></button>
          </div>
          <div class="panel-body" style="overflow:auto;text-align:right">${chips || '<span class="muted">لا مشاريع</span>'}</div>
        </div>`;
      document.body.appendChild(back);
      back.addEventListener('click', (e) => { if (e.target === back) back.remove(); });
      document.getElementById('pjClose').addEventListener('click', () => back.remove());
    }

    function pagerHtml(pages) {
      if (pages <= 1) return '';
      return `<div class="pager">
        <button class="btn-x btn-ghost btn-sm" id="prev" ${page === 0 ? 'disabled' : ''}><i class="fa-solid fa-chevron-right"></i> السابق</button>
        <span class="muted">صفحة ${page + 1} من ${pages}</span>
        <button class="btn-x btn-ghost btn-sm" id="next" ${page + 1 >= pages ? 'disabled' : ''}>التالي <i class="fa-solid fa-chevron-left"></i></button>
      </div>`;
    }
    function wirePager(pages) {
      document.getElementById('prev')?.addEventListener('click', () => { if (page > 0) { page--; load(); } });
      document.getElementById('next')?.addEventListener('click', () => { if (page + 1 < pages) { page++; load(); } });
    }

    // =================== الحصالة ===================
    function updateJarUI() {
      const el = document.getElementById('jarCount');
      if (el) el.textContent = jar.size.toLocaleString('en-US');
      const undo = document.getElementById('undoJar');
      const clear = document.getElementById('clearJar');
      if (undo) undo.disabled = jarBatches.length === 0;
      if (clear) clear.disabled = jar.size === 0;
    }

    // إضافة كل المتبرعين المطابقين للفلتر الحالي (وليس صفحة واحدة فقط)
    async function addCurrentFilterToJar() {
      const btn = document.getElementById('addToJar');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-x"></span> جارٍ الإضافة...';
      try {
        const CHUNK = 1000;
        let from = 0, done = false;
        const addedNow = []; // الأرقام الجديدة فعليًا في هذه الدفعة (للتراجع)
        while (!done) {
          let q = App.sb.from('donors').select('phone').range(from, from + CHUNK - 1);
          q = buildQuery(q);
          const { data, error } = await q;
          if (error) throw error;
          (data || []).forEach(r => {
            if (r.phone && !jar.has(r.phone)) { jar.add(r.phone); addedNow.push(r.phone); }
          });
          if (!data || data.length < CHUNK) done = true; else from += CHUNK;
        }
        if (addedNow.length) jarBatches.push(addedNow); // سجّل الدفعة للتراجع
        saveJar();
        App.toast(`أُضيف ${addedNow.length.toLocaleString('en-US')} متبرع جديد (الإجمالي ${jar.size.toLocaleString('en-US')}).`, 'ok');
      } catch (e) {
        App.toast(e.message || 'تعذّرت الإضافة', 'err');
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fa-solid fa-plus"></i> أضف نتائج الفلتر الحالي';
      }
    }

    // تراجع عن آخر إضافة (يزيل فقط الأرقام التي أضافتها آخر دفعة)
    function undoLastJar() {
      if (!jarBatches.length) return;
      const last = jarBatches.pop();
      last.forEach(p => jar.delete(p));
      saveJar();
      App.toast(`تم التراجع عن آخر إضافة (${last.length.toLocaleString('en-US')} متبرع).`, 'ok');
    }

    // تفريغ الحصالة بالكامل
    function clearJar() {
      if (!jar.size) return;
      if (!confirm('تفريغ الحصالة بالكامل؟')) return;
      jar.clear();
      jarBatches = [];
      saveJar();
      App.toast('تم تفريغ الحصالة.', 'ok');
    }

    async function openJarModal() {
      const phones = [...jar];
      const back = document.createElement('div');
      back.className = 'modal-back';
      back.innerHTML = `
        <div class="modal-box">
          <div class="panel-head">
            <h2><i class="fa-solid fa-piggy-bank text-gold"></i> الحصالة (${phones.length.toLocaleString('en-US')})</h2>
            <button class="btn-x btn-ghost btn-sm" id="jarClose"><i class="fa-solid fa-xmark"></i></button>
          </div>
          <div class="panel-body" style="overflow:auto">
            ${phones.length ? '' : '<div class="empty-state"><i class="fa-regular fa-folder-open"></i>الحصالة فارغة. افلتر ثم اضغط «أضف نتائج الفلتر الحالي».</div>'}
            <div id="jarLoad" class="${phones.length ? '' : 'hidden'}"><div class="center-load"><div class="spinner-x spinner-dark" style="width:28px;height:28px"></div></div></div>
            <div class="table-wrap hidden" id="jarTableWrap">
              <table class="data">
                <thead><tr><th>الاسم</th><th>الجوال</th><th>الإجمالي</th><th>العدد</th><th>الحالة</th><th>الفئة</th><th></th></tr></thead>
                <tbody id="jarBody"></tbody>
              </table>
            </div>
          </div>
          <div class="panel-head" style="border-top:1px solid var(--c-line);border-bottom:none">
            <button class="btn-x btn-danger btn-sm" id="jarClear"><i class="fa-solid fa-trash"></i> تفريغ الحصالة</button>
            <button class="btn-x btn-gold" id="jarExport" ${phones.length ? '' : 'disabled'}><i class="fa-solid fa-file-excel"></i> تصدير Excel</button>
          </div>
        </div>`;
      document.body.appendChild(back);
      back.addEventListener('click', (e) => { if (e.target === back) back.remove(); });
      document.getElementById('jarClose').addEventListener('click', () => back.remove());
      document.getElementById('jarClear').addEventListener('click', () => {
        if (confirm('تفريغ الحصالة بالكامل؟')) { jar.clear(); jarBatches = []; saveJar(); back.remove(); }
      });

      if (!phones.length) return;

      // جلب تفاصيل أرقام الحصالة (على دفعات) للعرض والتصدير
      const rows = await fetchJarRows(phones);
      document.getElementById('jarLoad').classList.add('hidden');
      const wrap = document.getElementById('jarTableWrap');
      wrap.classList.remove('hidden');
      document.getElementById('jarBody').innerHTML = rows.map(r => `
        <tr>
          <td>${App.esc(r.donor_name) || '—'}</td>
          <td dir="ltr" style="text-align:right">${App.esc(r.phone)}</td>
          <td style="font-weight:700">${App.fmtMoney(r.total_amount)}</td>
          <td>${r.donations_count}</td>
          <td><span class="badge-x ${r.status === 'مستمر' ? 'badge-active' : 'badge-inactive'}">${App.esc(r.status) || '—'}</span></td>
          <td><span class="badge-x badge-cat">${App.esc(r.category) || '—'}</span></td>
          <td><button class="btn-x btn-sm btn-ghost" data-rm="${App.esc(r.phone)}"><i class="fa-solid fa-xmark"></i></button></td>
        </tr>`).join('');

      document.querySelectorAll('[data-rm]').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const ph = e.currentTarget.dataset.rm;
          jar.delete(ph);
          // أزله من سجل الدفعات حفاظًا على اتساق التراجع
          jarBatches = jarBatches.map(b => b.filter(x => x !== ph)).filter(b => b.length);
          saveJar();
          back.remove(); openJarModal();
        });
      });

      document.getElementById('jarExport').addEventListener('click', () => exportJar(rows));
    }

    async function fetchJarRows(phones) {
      const out = [];
      const CHUNK = 300; // حد آمن لطول الاستعلام
      for (let i = 0; i < phones.length; i += CHUNK) {
        const slice = phones.slice(i, i + CHUNK);
        const { data, error } = await App.sb.from('donors').select('*').in('phone', slice);
        if (error) { App.toast(error.message, 'err'); break; }
        out.push(...(data || []));
      }
      return out;
    }

    function exportJar(rows) {
      // الحصالة تُصدّر خمسة أعمدة فقط (قابلة للتغيير مستقبلاً):
      // الاسم - الجوال - إجمالي التبرعات - الحالة - الفئة
      const data = rows.map(r => ({
        'الاسم': r.donor_name || '',
        'الجوال': (r.phone_status === 'صحيح' ? r.phone : (r.phone_raw || '')) || '',
        'إجمالي التبرعات': r.total_amount || 0,
        'الحالة': r.status || '',
        'الفئة': r.category || '',
      }));
      const ws = window.XLSX.utils.json_to_sheet(data);
      const wb = window.XLSX.utils.book_new();
      window.XLSX.utils.book_append_sheet(wb, ws, 'الحصالة');
      const today = new Date().toISOString().slice(0, 10);
      window.XLSX.writeFile(wb, `الحصالة-${today}.xlsx`);
      App.toast(`تم تصدير ${rows.length.toLocaleString('en-US')} متبرع.`, 'ok');
    }
  </script>
</body>
</html>
