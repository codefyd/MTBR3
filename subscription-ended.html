<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>انتهى الاشتراك | ولاء</title>
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <main style="min-height:100vh;display:grid;place-items:center;padding:1.5rem">
    <section class="panel" style="max-width:560px;padding:2rem;text-align:center">
      <h1 style="font-size:1.55rem">انتهت صلاحية الاشتراك</h1>
      <p id="message" class="muted">تواصل مع مدير المنصة لتجديد اشتراك الجهة.</p>
      <button id="logoutBtn" class="btn-x">تسجيل الخروج</button>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4"></script>
  <script src="assets/config.js"></script>
  <script src="assets/app.js"></script>
  <script>
    (async()=>{
      try {
        const ctx=await App.loadAccessContext();
        const org=ctx.organization;
        if(org) document.getElementById('message').textContent=`انتهى اشتراك ${org.name}. تواصل مع مدير المنصة لتجديده.`;
      } catch(_) {}
      document.getElementById('logoutBtn').onclick=async()=>{await App.sb.auth.signOut();location.href='login.html';};
    })();
  </script>
</body>
</html>
