<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>العمليات | منصة ولاء</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <div class="app-shell" id="shell"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="assets/config.js"></script>
  <script src="assets/app.js"></script>
  <script>
    let page = 0, search = '', count = 0;

    (async () => {
      const session = await App.initShell('operations.html');
      if (!session) return;
      renderPage();
      load();
    })();

    function renderPage() {
      document.getElementById('mainArea').innerHTML = `
        <div class="topbar"><h1><i class="fa-solid fa-receipt text-gold"></i> العمليات</h1></div>
        <div class="content">
          <div class="panel fade-in" style="margin-bottom:1.5rem">
            <div class="panel-body">
              <div class="dropzone" id="dz">
                <i class="fa-solid fa-file-arrow-up"></i>
                <div style="font-weight:700;font-size:1.1rem">رفع ملف عمليات (CSV)</div>
                <div class="muted" style="font-size:.92rem;margin-top:.35rem">
                  الأعمدة: رقم، #العملية، الاسم، الجوال، المشروع، كود الإحالة، القيمة، الكمية، المجموع، التاريخ، الوقت
                </div>
                <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" style="display:none" />
              </div>
            </div>
          </div>
          <div class="panel fade-in">
            <div class="panel-head">
              <h2>سجل العمليات <span class="muted" id="cnt" style="font-size:.9rem;font-weight:400"></span></h2>
              <input class="field" id="search" placeholder="بحث بالجوال أو الاسم أو رقم العملية أو حالة الرقم" style="max-width:300px" />
            </div>
            <div class="panel-body"><div id="tableArea"></div></div>
          </div>
        </div>`;

      wireDropzone();
      let t;
      document.getElementById('search').addEventListener('input', (e) => {
        clearTimeout(t);
        t = setTimeout(() => { search = e.target.value.trim(); page = 0; load(); }, 350);
      });
    }

    function wireDropzone() {
      const dz = document.getElementById('dz');
      const input = document.getElementById('fileInput');
      dz.addEventListener('click', () => input.click());
      dz.addEventListener('dragover', (e) => { e.preventDefault(); dz.classList.add('drag'); });
      dz.addEventListener('dragleave', () => dz.classList.remove('drag'));
      dz.addEventListener('drop', (e) => { e.preventDefault(); dz.classList.remove('drag'); if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); });
      input.addEventListener('change', (e) => { if (e.target.files[0]) handleFile(e.target.files[0]); });
    }

    async function handleFile(file) {
      const dz = document.getElementById('dz');
      dz.innerHTML = '<div class="spinner-x spinner-dark" style="margin:0 auto .75rem;width:28px;height:28px"></div><div style="font-weight:700">جارٍ المعالجة وإعادة الحساب...</div><div class="muted">' + App.esc(file.name) + '</div>';
      try {
        const rows = await App.readExcel(file);
        if (!rows.length) throw new Error('الملف فارغ أو لا يحتوي بيانات');

        const records = [];
        let skipped = 0;
        const phoneReport = { valid: 0, invalid: 0, empty: 0, rows: [] };
        for (const row of rows) {
          const lineNo = App.toNum(App.pick(row, ['رقم']));
          const opNo = App.toNum(App.pick(row, ['#العملية', 'العملية']));
          if (lineNo === null || opNo === null) { skipped++; continue; }
          const phoneRaw = App.pick(row, ['الجوال']);
          // تقرير محلي فقط؛ قاعدة البيانات تحفظ نفس التصنيف داخل العمليات.
          const norm = App.normalizePhone(phoneRaw, { lineNo, operationNo: opNo });
          if (norm.status === 'صحيح') phoneReport.valid++;
          else if (norm.status === 'فارغ') phoneReport.empty++;
          else phoneReport.invalid++;
          if (norm.status !== 'صحيح') {
            phoneReport.rows.push({
              'رقم': lineNo, '#العملية': opNo,
              'الاسم': App.pick(row, ['الاسم']) || '',
              'الجوال كما ورد': phoneRaw == null ? '' : String(phoneRaw),
              'الحالة': norm.status,
              'الملاحظة': norm.reason,
            });
          }
          records.push({
            line_no: lineNo, operation_no: opNo,
            donor_name: App.pick(row, ['الاسم']),
            phone_raw: phoneRaw != null ? String(phoneRaw) : null,
            project: App.pick(row, ['المشروع']),
            referral_code: App.pick(row, ['كود الإحالة', 'كودالإحالة']),
            value: App.toNum(App.pick(row, ['القيمة'])),
            quantity: App.toNum(App.pick(row, ['الكمية'])),
            total: App.toNum(App.pick(row, ['المجموع'])),
            op_datetime: App.toISO(App.pick(row, ['التاريخ', 'التاريخ والوقت'])) || App.toISO(App.pick(row, ['الوقت'])),
          });
        }
        if (!records.length) throw new Error('لم يتم العثور على صفوف صالحة. تأكد من أسماء الأعمدة.');

        const upserted = await App.rpcInBatches('upsert_operations', records);

        // نُظهر نتيجة الرفع والتقرير مباشرة؛ لأن العمليات وصلت فعلًا.
        // بعدها نعيد بناء ملفات المتبرعين على دفعات حتى لا يصير timeout.
        App.toast(`تم رفع ${upserted} صف${skipped ? ` (تخطّي ${skipped})` : ''}. جارٍ تحديث ملفات المتبرعين...`, 'ok');
        showPhoneReport({ ...phoneReport, skipped, total: records.length });
        page = 0;
        load();

        try {
          await App.rebuildDonorsInBatches(({ total, processed, remaining }) => {
            const pct = total ? Math.min(100, Math.round((processed / total) * 100)) : 100;
            dz.innerHTML = `
              <div class="spinner-x spinner-dark" style="margin:0 auto .75rem;width:28px;height:28px"></div>
              <div style="font-weight:700">جارٍ تحديث ملفات المتبرعين على دفعات... ${pct}%</div>
              <div class="muted">تم ${App.fmtNum(processed)} من ${App.fmtNum(total)} — المتبقي ${App.fmtNum(remaining)}</div>`;
          });
          App.toast('تم رفع العمليات وتحديث ملفات المتبرعين بنجاح.', 'ok');
        } catch (recalcErr) {
          App.toast(`تم رفع العمليات، لكن لم يكتمل تحديث ملفات المتبرعين: ${recalcErr.message || recalcErr}`, 'err');
        }
      } catch (e) {
        App.toast(e.message || 'فشل الرفع', 'err');
      } finally {
        resetDropzone();
      }
    }

    function resetDropzone() {
      const dz = document.getElementById('dz');
      dz.innerHTML = `<i class="fa-solid fa-file-arrow-up"></i>
        <div style="font-weight:700;font-size:1.1rem">رفع ملف عمليات (CSV)</div>
        <div class="muted" style="font-size:.92rem;margin-top:.35rem">الأعمدة: رقم، #العملية، الاسم، الجوال، المشروع، كود الإحالة، القيمة، الكمية، المجموع، التاريخ، الوقت</div>
        <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" style="display:none" />`;
      wireDropzone();
    }

    async function load() {
      const area = document.getElementById('tableArea');
      area.innerHTML = '<div class="center-load"><div class="spinner-x spinner-dark" style="width:32px;height:32px"></div></div>';

      let q = App.sb.from('operations').select('line_no,operation_no,donor_name,phone_raw,phone,phone_status,phone_issue,project,referral_code,value,quantity,total,op_datetime', { count: 'exact' })
        .order('op_datetime', { ascending: false })
        .range(page * App.PAGE_SIZE, page * App.PAGE_SIZE + App.PAGE_SIZE - 1);
      if (search) {
        const numPart = /^\d+$/.test(search) ? search : '0';
        q = q.or(`phone.ilike.%${search}%,phone_raw.ilike.%${search}%,phone_status.ilike.%${search}%,donor_name.ilike.%${search}%,operation_no.eq.${numPart}`);
      }
      const { data, count: c, error } = await q;
      if (error) { area.innerHTML = `<div class="empty-state">${App.esc(error.message)}</div>`; return; }
      count = c || 0;
      document.getElementById('cnt').textContent = `(${count.toLocaleString('en-US')} صف)`;

      if (!data.length) {
        area.innerHTML = '<div class="empty-state"><i class="fa-regular fa-folder-open"></i>لا توجد عمليات بعد. ابدأ برفع ملف Excel.</div>';
        return;
      }

      const rowsHtml = data.map(r => {
        const status = r.phone_status || 'صحيح';
        const isValid = status === 'صحيح';
        const shownPhone = isValid ? r.phone : (r.phone_raw || '—');
        const badge = status === 'صحيح' ? 'badge-active' : status === 'فارغ' ? 'badge-cat' : 'badge-inactive';
        return `
        <tr>
          <td>${r.line_no}</td><td>${r.operation_no}</td>
          <td>${App.esc(r.donor_name) || '—'}</td>
          <td dir="ltr" style="text-align:right">${App.esc(shownPhone) || '—'}</td>
          <td><span class="badge-x ${badge}">${App.esc(status)}</span>${r.phone_issue ? `<div class="muted" style="font-size:.75rem;margin-top:.2rem">${App.esc(r.phone_issue)}</div>` : ''}</td>
          <td>${App.esc(r.project) || '—'}</td>
          <td>${App.esc(r.referral_code) || '—'}</td>
          <td>${r.value != null ? App.fmtMoney(r.value) : '—'}</td>
          <td>${r.quantity ?? '—'}</td>
          <td style="font-weight:700">${r.total != null ? App.fmtMoney(r.total) : '—'}</td>
          <td>${App.fmtDateTime(r.op_datetime)}</td>
        </tr>`;
      }).join('');

      const pages = Math.ceil(count / App.PAGE_SIZE);
      area.innerHTML = `
        <div class="table-wrap"><table class="data">
          <thead><tr><th>رقم</th><th>#العملية</th><th>الاسم</th><th>الجوال</th><th>حالة الرقم</th><th>المشروع</th><th>كود الإحالة</th><th>القيمة</th><th>الكمية</th><th>المجموع</th><th>التاريخ والوقت</th></tr></thead>
          <tbody>${rowsHtml}</tbody>
        </table></div>
        ${pagerHtml(pages)}`;
      wirePager(pages);
    }

    function pagerHtml(pages) {
      if (pages <= 1) return '';
      return `<div class="pager">
        <button class="btn-x btn-ghost btn-sm" id="prev" ${page === 0 ? 'disabled' : ''}><i class="fa-solid fa-chevron-right"></i> السابق</button>
        <span class="muted">صفحة ${page + 1} من ${pages}</span>
        <button class="btn-x btn-ghost btn-sm" id="next" ${page + 1 >= pages ? 'disabled' : ''}>التالي <i class="fa-solid fa-chevron-left"></i></button>
      </div>`;
    }
    function wirePager(pages) {
      document.getElementById('prev')?.addEventListener('click', () => { if (page > 0) { page--; load(); } });
      document.getElementById('next')?.addEventListener('click', () => { if (page + 1 < pages) { page++; load(); } });
    }

    // تقرير أرقام الجوال بعد الرفع (نافذة + تصدير Excel)
    function showPhoneReport(report) {
      const reviewRows = report.rows || [];
      const back = document.createElement('div');
      back.className = 'modal-back';
      const preview = reviewRows.slice(0, 100).map(r => `
        <tr>
          <td>${r['رقم']}</td><td>${r['#العملية']}</td>
          <td>${App.esc(r['الاسم'])}</td>
          <td dir="ltr" style="text-align:right">${App.esc(r['الجوال كما ورد'])}</td>
          <td>${App.esc(r['الحالة'])}</td>
          <td>${App.esc(r['الملاحظة'])}</td>
        </tr>`).join('');
      back.innerHTML = `
        <div class="modal-box">
          <div class="panel-head">
            <h2><i class="fa-solid fa-clipboard-check text-gold"></i> تقرير أرقام الجوال بعد الرفع</h2>
            <button class="btn-x btn-ghost btn-sm" id="phClose"><i class="fa-solid fa-xmark"></i></button>
          </div>
          <div class="panel-body" style="overflow:auto">
            <div class="row g-3" style="margin-bottom:1rem">
              <div class="col-6 col-lg-3"><div class="kpi-card"><div class="kpi-label">صفوف مقبولة</div><div class="kpi-value">${App.fmtNum(report.total || 0)}</div></div></div>
              <div class="col-6 col-lg-3"><div class="kpi-card"><div class="kpi-label">أرقام صحيحة</div><div class="kpi-value">${App.fmtNum(report.valid || 0)}</div></div></div>
              <div class="col-6 col-lg-3"><div class="kpi-card"><div class="kpi-label">أرقام خاطئة</div><div class="kpi-value">${App.fmtNum(report.invalid || 0)}</div></div></div>
              <div class="col-6 col-lg-3"><div class="kpi-card"><div class="kpi-label">أرقام فارغة</div><div class="kpi-value">${App.fmtNum(report.empty || 0)}</div></div></div>
            </div>
            <p class="muted" style="margin-top:0">تم قبول جميع الصفوف الصالحة من ناحية رقم العملية. الأرقام الخاطئة والفارغة تدخل الآن في العمليات وملفات المتبرعين كمراجعة، ولا تُحذف من التحليلات.${report.skipped ? ` تم تخطي ${App.fmtNum(report.skipped)} صف بلا رقم/عملية.` : ''}${reviewRows.length > 100 ? ' (عرض أول 100 فقط — التصدير يشمل الكل)' : ''}</p>
            ${reviewRows.length ? `<div class="table-wrap"><table class="data">
              <thead><tr><th>رقم</th><th>#العملية</th><th>الاسم</th><th>الجوال كما ورد</th><th>الحالة</th><th>الملاحظة</th></tr></thead>
              <tbody>${preview}</tbody>
            </table></div>` : '<div class="empty-state"><i class="fa-solid fa-circle-check"></i>كل الأرقام في الملف صحيحة.</div>'}
          </div>
          <div class="panel-head" style="border-top:1px solid var(--c-line);border-bottom:none;justify-content:flex-end">
            <button class="btn-x btn-gold" id="phExport" ${reviewRows.length ? '' : 'disabled'}><i class="fa-solid fa-file-excel"></i> تصدير أرقام المراجعة</button>
          </div>
        </div>`;
      document.body.appendChild(back);
      back.addEventListener('click', (e) => { if (e.target === back) back.remove(); });
      document.getElementById('phClose').addEventListener('click', () => back.remove());
      document.getElementById('phExport')?.addEventListener('click', () => {
        const ws = window.XLSX.utils.json_to_sheet(reviewRows);
        const wb = window.XLSX.utils.book_new();
        window.XLSX.utils.book_append_sheet(wb, ws, 'أرقام للمراجعة');
        window.XLSX.writeFile(wb, `تقرير-أرقام-الجوال-${new Date().toISOString().slice(0,10)}.xlsx`);
      });
    }
  </script>
</body>
</html>
