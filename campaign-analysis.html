<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; font-src 'self' https://cdnjs.cloudflare.com data:; img-src 'self' data:; connect-src 'self' https://gaermmsfbtfcghegdkmq.supabase.co https://*.supabase.co wss://*.supabase.co; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تحليل الحملات التسويقية | منصة ولاء</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <div class="app-shell" id="shell"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4"></script>
  <script src="assets/config.js"></script>
  <script src="assets/app.js"></script>
  <script>
    let analysisRows = [];
    let projects = [];
    let loading = false;

    (async () => {
      const session = await App.initShell('campaign-analysis.html');
      if (!session) return;
      renderPage();
      setDefaultDates();
      await loadProjects();
      await loadAnalysis();
    })();

    function renderPage() {
      document.getElementById('mainArea').innerHTML = `
        <div class="topbar">
          <h1><i class="fa-solid fa-chart-simple text-gold"></i> تحليل الحملات التسويقية</h1>
          <div style="display:flex;gap:.6rem;align-items:center;flex-wrap:wrap">
            <button class="btn-x btn-ghost btn-sm" id="exportBtn"><i class="fa-solid fa-file-csv"></i> تصدير CSV</button>
            <button class="btn-x btn-sm" id="refreshBtn"><i class="fa-solid fa-rotate"></i> تحديث</button>
          </div>
        </div>

        <div class="content">
          <div class="panel fade-in" style="margin-bottom:1.25rem">
            <div class="panel-head">
              <h2><i class="fa-solid fa-filter text-gold"></i> الفلاتر</h2>
              <div class="muted" style="font-size:.88rem">التكلفة تحفظ على كود الإحالة نفسه، ثم تُحتسب على النتائج الظاهرة حسب الفلاتر.</div>
            </div>
            <div class="panel-body">
              <div class="analysis-filter-grid">
                <div>
                  <label class="lbl" for="fromDate">من تاريخ</label>
                  <input class="field" id="fromDate" type="date" />
                </div>
                <div>
                  <label class="lbl" for="toDate">إلى تاريخ</label>
                  <input class="field" id="toDate" type="date" />
                </div>
                <div>
                  <label class="lbl" for="projectFilter">المشروع</label>
                  <select class="field" id="projectFilter"><option value="">كل المشاريع</option></select>
                </div>
                <div>
                  <label class="lbl" for="codeSearch">بحث بكود الإحالة</label>
                  <input class="field" id="codeSearch" placeholder="مثال: SMS أو INF" />
                </div>
                <div class="analysis-filter-actions">
                  <button class="btn-x" id="applyBtn"><i class="fa-solid fa-magnifying-glass"></i> تطبيق</button>
                  <button class="btn-x btn-ghost" id="resetBtn"><i class="fa-solid fa-eraser"></i> مسح</button>
                </div>
              </div>
            </div>
          </div>

          <div class="row g-3" id="summaryCards" style="margin-bottom:1.25rem"></div>

          <div class="panel fade-in">
            <div class="panel-head">
              <h2>أداء أكواد الإحالة <span class="muted" id="rowsCount" style="font-size:.9rem;font-weight:400"></span></h2>
              <div class="analysis-help-pill"><i class="fa-solid fa-circle-info"></i> ROAS = التبرعات ÷ التكلفة، ونسبة التكلفة من العوائد = التكلفة ÷ إجمالي التبرعات</div>
            </div>
            <div class="panel-body"><div id="analysisTable"></div></div>
          </div>
        </div>`;

      document.getElementById('applyBtn').addEventListener('click', loadAnalysis);
      document.getElementById('refreshBtn').addEventListener('click', loadAnalysis);
      document.getElementById('resetBtn').addEventListener('click', () => {
        document.getElementById('fromDate').value = '';
        document.getElementById('toDate').value = '';
        document.getElementById('projectFilter').value = '';
        document.getElementById('codeSearch').value = '';
        loadAnalysis();
      });
      document.getElementById('exportBtn').addEventListener('click', exportRows);

      let t;
      document.getElementById('codeSearch').addEventListener('input', () => {
        clearTimeout(t);
        t = setTimeout(loadAnalysis, 450);
      });
      document.getElementById('projectFilter').addEventListener('change', loadAnalysis);
      document.getElementById('fromDate').addEventListener('change', loadAnalysis);
      document.getElementById('toDate').addEventListener('change', loadAnalysis);
    }

    function setDefaultDates() {
      const now = new Date();
      const y = now.getFullYear();
      document.getElementById('fromDate').value = `${y}-01-01`;
      document.getElementById('toDate').value = toDateInput(now);
    }

    function toDateInput(d) {
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${day}`;
    }

    async function loadProjects() {
      const sel = document.getElementById('projectFilter');
      const { data, error } = await App.sb.rpc('operations_projects');
      if (error) {
        App.toast('تعذر تحميل المشاريع: ' + error.message, 'err');
        return;
      }
      projects = data || [];
      sel.innerHTML = '<option value="">كل المشاريع</option>' + projects.map(p => `<option value="${App.esc(p)}">${App.esc(p)}</option>`).join('');
    }

    function currentFilters() {
      return {
        p_from: document.getElementById('fromDate').value || null,
        p_to: document.getElementById('toDate').value || null,
        p_project: document.getElementById('projectFilter').value || null,
        p_search: document.getElementById('codeSearch').value.trim() || null,
      };
    }

    async function loadAnalysis() {
      if (loading) return;
      loading = true;
      const area = document.getElementById('analysisTable');
      area.innerHTML = `<div class="center-load"><div class="spinner-x spinner-dark" style="width:32px;height:32px"></div><div class="muted" style="margin-top:.6rem">جارٍ تحليل أكواد الإحالة…</div></div>`;
      renderSummary([]);
      try {
        const { data, error } = await App.sb.rpc('referral_code_analysis', currentFilters());
        if (error) throw error;
        analysisRows = (data || []).map(r => normalizeRow(r));
        renderSummary(analysisRows);
        renderTable(analysisRows);
      } catch (e) {
        area.innerHTML = `<div class="empty-state"><i class="fa-solid fa-triangle-exclamation"></i>${App.esc(e.message || 'فشل تحميل التحليل')}</div>`;
        App.toast(e.message || 'فشل تحميل التحليل', 'err');
      } finally {
        loading = false;
      }
    }

    function normalizeRow(r) {
      const total = Number(r.total_amount || 0);
      const cost = Number(r.cost || 0);
      return {
        ...r,
        total_amount: total,
        cost,
        net_return: Number(r.net_return || (total - cost)),
        roas: r.roas === null || r.roas === undefined ? null : Number(r.roas),
        roi_percent: r.roi_percent === null || r.roi_percent === undefined ? null : Number(r.roi_percent),
        cost_revenue_percent: total > 0 ? (cost / total * 100) : null,
        rows_count: Number(r.rows_count || 0),
        donations_count: Number(r.donations_count || 0),
        donor_operations: Number(r.donor_operations || 0),
        unique_donors: Number(r.unique_donors || 0),
      };
    }

    function renderSummary(rows) {
      const totalAmount = rows.reduce((s, r) => s + Number(r.total_amount || 0), 0);
      const totalCost = rows.reduce((s, r) => s + Number(r.cost || 0), 0);
      const net = totalAmount - totalCost;
      const uniqueCodes = rows.length;
      const uniqueDonors = rows.reduce((s, r) => s + Number(r.unique_donors || 0), 0);
      const roas = totalCost > 0 ? totalAmount / totalCost : null;
      const costRevenuePercent = totalAmount > 0 ? ((totalCost / totalAmount) * 100) : null;

      document.getElementById('summaryCards').innerHTML = `
        ${kpiCard('إجمالي التبرعات', App.fmtMoney(totalAmount) + ' ر.س', 'fa-sack-dollar')}
        ${kpiCard('إجمالي التكلفة', App.fmtMoney(totalCost) + ' ر.س', 'fa-coins', true)}
        ${kpiCard('صافي العائد', App.fmtMoney(net) + ' ر.س', 'fa-arrow-trend-up')}
        ${kpiCard('العائد على التكلفة', roas === null ? '—' : roas.toFixed(2) + 'x', 'fa-gauge-high', true)}
        ${kpiCard('نسبة التكلفة من العوائد', costRevenuePercent === null ? '—' : costRevenuePercent.toFixed(1) + '%', 'fa-percent')}
        ${kpiCard('أكواد / متبرعون فريدون', `${App.fmtNum(uniqueCodes)} / ${App.fmtNum(uniqueDonors)}`, 'fa-fingerprint', true)}
      `;
    }

    function kpiCard(label, value, icon, gold = false) {
      return `<div class="col-12 col-md-6 col-xl-2"><div class="kpi-card ${gold ? 'gold' : ''}">
        <div class="kpi-icon"><i class="fa-solid ${icon}"></i></div>
        <div class="kpi-label">${label}</div>
        <div class="kpi-value">${value}</div>
      </div></div>`;
    }

    function renderTable(rows) {
      document.getElementById('rowsCount').textContent = `(${App.fmtNum(rows.length)} كود)`;
      const area = document.getElementById('analysisTable');
      if (!rows.length) {
        area.innerHTML = `<div class="empty-state"><i class="fa-regular fa-folder-open"></i>لا توجد أكواد إحالة ضمن الفلاتر الحالية.</div>`;
        return;
      }

      const body = rows.map((r, i) => {
        const costVal = Number(r.cost || 0) > 0 ? Number(r.cost).toFixed(2) : '';
        const costPercentVal = r.cost_revenue_percent;
        const costPercent = costPercentVal === null ? '—' : `${Number(costPercentVal).toFixed(1)}%`;
        const costPercentClass = costPercentVal === null ? '' : (costPercentVal <= 25 ? 'good' : (costPercentVal > 50 ? 'low' : ''));
        const roas = r.roas === null ? '—' : `${Number(r.roas).toFixed(2)}x`;
        const projectList = Array.isArray(r.projects) ? r.projects : [];
        const projects = projectList.length
          ? `<button class="proj-trigger analysis-proj-trigger" data-idx="${i}"><i class="fa-solid fa-list"></i> ${App.fmtNum(projectList.length)} مشروع</button>`
          : '<span class="muted">—</span>';
        return `<tr>
          <td class="analysis-code-cell"><span dir="ltr">${App.esc(r.referral_code)}</span></td>
          <td class="projects-cell analysis-projects-cell">${projects}</td>
          <td>${App.fmtMoney(r.total_amount)} ر.س</td>
          <td>${App.fmtNum(r.donations_count)}</td>
          <td>${App.fmtNum(r.donor_operations)}</td>
          <td>${App.fmtNum(r.unique_donors)}</td>
          <td>${App.fmtDate(r.first_donation)}</td>
          <td>${App.fmtDate(r.last_donation)}</td>
          <td style="min-width:150px"><input class="field cost-input" type="number" min="0" step="0.01" data-idx="${i}" value="${costVal}" placeholder="0.00" /></td>
          <td>${App.fmtMoney(r.net_return)} ر.س</td>
          <td><span class="roi-chip ${costPercentClass}">${costPercent}</span></td>
          <td><span class="roi-chip ${r.roas === null ? '' : 'good'}">${roas}</span></td>
          <td><button class="btn-x btn-sm save-cost-btn" data-idx="${i}"><i class="fa-solid fa-floppy-disk"></i> حفظ</button></td>
        </tr>`;
      }).join('');

      area.innerHTML = `<div class="table-wrap analysis-table-wrap"><table class="data analysis-table">
        <thead><tr>
          <th>كود الإحالة</th>
          <th>المشاريع</th>
          <th>إجمالي التبرعات</th>
          <th>عدد العمليات</th>
          <th>متبرعون عبر الكود</th>
          <th>متبرع فريد</th>
          <th>أول تبرع</th>
          <th>آخر تبرع</th>
          <th>التكلفة</th>
          <th>صافي العائد</th>
          <th>نسبة التكلفة من العوائد</th>
          <th>ROAS</th>
          <th>إجراء</th>
        </tr></thead>
        <tbody>${body}</tbody>
      </table></div>`;

      area.querySelectorAll('.save-cost-btn').forEach(btn => {
        btn.addEventListener('click', () => saveCost(Number(btn.dataset.idx), btn));
      });
      area.querySelectorAll('.analysis-proj-trigger').forEach(btn => {
        btn.addEventListener('click', () => {
          const row = analysisRows[Number(btn.dataset.idx)];
          openAnalysisProjectsModal(row?.referral_code || '', row?.projects || []);
        });
      });
    }

    function openAnalysisProjectsModal(code, projects) {
      const back = document.createElement('div');
      back.className = 'modal-back';
      const list = Array.isArray(projects) ? projects : [];
      const chips = list.map(p => `<span class="chip" style="font-size:.92rem;padding:.3rem .7rem;margin:.2rem">${App.esc(p)}</span>`).join('');
      back.innerHTML = `
        <div class="modal-box" style="max-width:560px">
          <div class="panel-head">
            <h2><i class="fa-solid fa-list text-gold"></i> مشاريع كود الإحالة <span dir="ltr">${App.esc(code)}</span> <span class="muted" style="font-weight:400;font-size:.9rem">(${App.fmtNum(list.length)})</span></h2>
            <button class="btn-x btn-ghost btn-sm analysis-modal-close"><i class="fa-solid fa-xmark"></i></button>
          </div>
          <div class="panel-body" style="overflow:auto;text-align:right">${chips || '<span class="muted">لا مشاريع</span>'}</div>
        </div>`;
      document.body.appendChild(back);
      back.addEventListener('click', (e) => { if (e.target === back) back.remove(); });
      back.querySelector('.analysis-modal-close').addEventListener('click', () => back.remove());
    }

    async function saveCost(idx, btn) {
      const row = analysisRows[idx];
      if (!row) return;
      const input = document.querySelector(`.cost-input[data-idx="${idx}"]`);
      const cost = Number(input?.value || 0);
      if (Number.isNaN(cost) || cost < 0) {
        App.toast('أدخل تكلفة صحيحة أكبر من أو تساوي صفر.', 'err');
        return;
      }
      const oldHtml = btn.innerHTML;
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-x"></span> حفظ';
      try {
        const { error } = await App.sb.rpc('save_referral_code_cost', {
          p_referral_code: row.referral_code,
          p_cost: cost,
          p_note: null,
        });
        if (error) throw error;
        App.toast('تم حفظ تكلفة الكود.', 'ok');
        await loadAnalysis();
      } catch (e) {
        App.toast(e.message || 'فشل حفظ التكلفة', 'err');
        btn.disabled = false;
        btn.innerHTML = oldHtml;
      }
    }

    function exportRows() {
      if (!analysisRows.length) {
        App.toast('لا توجد بيانات للتصدير.', 'err');
        return;
      }
      const rows = analysisRows.map(r => ({
        'كود الإحالة': r.referral_code,
        'المشاريع': (r.projects || []).join(' | '),
        'إجمالي التبرعات': r.total_amount,
        'عدد العمليات': r.donations_count,
        'متبرعون عبر الكود': r.donor_operations,
        'متبرع فريد': r.unique_donors,
        'أول تبرع': App.fmtDate(r.first_donation),
        'آخر تبرع': App.fmtDate(r.last_donation),
        'التكلفة': r.cost,
        'صافي العائد': r.net_return,
        'نسبة التكلفة من العوائد %': r.cost_revenue_percent === null ? '' : Number(r.cost_revenue_percent).toFixed(2),
        'ROAS': r.roas === null ? '' : Number(r.roas).toFixed(2),
      }));
      App.downloadCsv('referral-code-analysis.csv', rows);
    }
  </script>
</body>
</html>
