<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; font-src 'self' https://cdnjs.cloudflare.com data:; img-src 'self' data:; connect-src 'self' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://*.supabase.co wss://*.supabase.co; base-uri 'self'; form-action 'self'" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>المستهدفون في الحملات | منصة ولاء</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <div class="app-shell" id="shell"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4"></script>
  <script src="assets/config.js"></script>
  <script src="assets/app.js"></script>
  <script>
    let page = 0, search = '', count = 0;
    const CAMPAIGN_RECALC_KEY = 'mtbr:campaigns:recalculateAfterUpload';

    (async () => {
      const session = await App.initShell('campaigns.html');
      if (!session) return;
      renderPage();
      load();
    })();

    function renderPage() {
      document.getElementById('mainArea').innerHTML = `
        <div class="topbar"><h1><i class="fa-solid fa-bullhorn text-gold"></i> المستهدفون في الحملات</h1></div>
        <div class="content">
          <div class="panel fade-in" style="margin-bottom:1.5rem">
            <div class="panel-body">
              <div class="dropzone" id="dz">
                <i class="fa-solid fa-file-arrow-up"></i>
                <div style="font-weight:700;font-size:1.1rem">رفع ملف مستهدفين (CSV)</div>
                <div class="muted" style="font-size:.92rem;margin-top:.35rem">الأعمدة المطلوبة: الجوال، اسم الحملة، تاريخ الاستهداف — يقبل ملفات CSV فقط</div>
                <label style="display:flex;gap:.55rem;align-items:center;justify-content:center;margin-top:.9rem;cursor:pointer">
                  <input type="checkbox" id="recalcAfterUpload" />
                  <span class="muted">إعادة احتساب ملفات المتبرعين بعد الحفظ</span>
                </label>
                <input type="file" id="fileInput" accept=".csv" style="display:none" />
              </div>
            </div>
          </div>
          <div class="panel fade-in">
            <div class="panel-head">
              <h2>سجل الاستهداف <span class="muted" id="cnt" style="font-size:.9rem;font-weight:400"></span></h2>
              <input class="field" id="search" placeholder="بحث بالجوال أو اسم الحملة" style="max-width:280px" />
            </div>
            <div class="panel-body"><div id="tableArea"></div></div>
          </div>
        </div>`;
      wireDropzone();
      let t;
      document.getElementById('search').addEventListener('input', (e) => {
        clearTimeout(t); t = setTimeout(() => { search = e.target.value.trim(); page = 0; load(); }, 350);
      });
    }

    function wireDropzone() {
      const dz = document.getElementById('dz');
      const input = document.getElementById('fileInput');
      const recalcToggle = document.getElementById('recalcAfterUpload');
      if (recalcToggle) {
        recalcToggle.checked = localStorage.getItem(CAMPAIGN_RECALC_KEY) === '1';
        recalcToggle.addEventListener('click', (e) => e.stopPropagation());
        recalcToggle.closest('label')?.addEventListener('click', (e) => e.stopPropagation());
        recalcToggle.addEventListener('change', () => {
          localStorage.setItem(CAMPAIGN_RECALC_KEY, recalcToggle.checked ? '1' : '0');
        });
      }
      dz.addEventListener('click', () => input.click());
      dz.addEventListener('dragover', (e) => { e.preventDefault(); dz.classList.add('drag'); });
      dz.addEventListener('dragleave', () => dz.classList.remove('drag'));
      dz.addEventListener('drop', (e) => { e.preventDefault(); dz.classList.remove('drag'); if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); });
      input.addEventListener('change', (e) => { if (e.target.files[0]) handleFile(e.target.files[0]); });
    }

    async function handleFile(file) {
      const dz = document.getElementById('dz');
      dz.innerHTML = '<div class="spinner-x spinner-dark" style="margin:0 auto .75rem;width:28px;height:28px"></div><div style="font-weight:700">جارٍ المعالجة وتحديث الملفات...</div><div class="muted">' + App.esc(file.name) + '</div>';
      try {
        const rows = await App.readCsv(file);
        if (!rows.length) throw new Error('الملف فارغ');

        const PHONE_KEYS = ['الجوال', 'رقم الجوال', 'رقمالجوال', 'جوال', 'الهاتف', 'رقم الهاتف', 'رقمالهاتف', 'الموبايل', 'رقم الموبايل', 'mobile', 'phone', 'Phone', 'Mobile'];
        const CAMPAIGN_KEYS = ['اسم الحملة', 'اسمالحملة', 'الحملة', 'campaign_name', 'campaign name', 'campaign'];
        const DATE_KEYS = ['تاريخ الاستهداف', 'تاريخالاستهداف', 'التاريخ', 'target_date', 'target date', 'date'];

        const records = [];
        let skipped = 0;
        let missingPhoneColumn = 0;
        const rejected = [];
        const filePhones = new Set(); // أرقام هذا الملف للتحديث التزايدي

        for (const row of rows) {
          const phoneRaw = App.pick(row, PHONE_KEYS);
          const campaignName = App.pick(row, CAMPAIGN_KEYS);
          const targetDateRaw = App.pick(row, DATE_KEYS);

          if (phoneRaw === null || phoneRaw === undefined || String(phoneRaw).trim() === '') {
            missingPhoneColumn++;
            skipped++;
            continue;
          }

          const norm = App.normalizePhone(phoneRaw);
          if (norm.status !== 'صحيح') {
            skipped++;
            rejected.push({
              'الجوال كما ورد': String(phoneRaw),
              'اسم الحملة': campaignName || '',
              'سبب الرفض': norm.reason || 'رقم غير صالح',
            });
            continue;
          }

          if (norm.phone) filePhones.add(norm.phone);
          records.push({
            phone_raw: String(phoneRaw),
            campaign_name: campaignName || null,
            target_date: App.toISO(targetDateRaw),
          });
        }

        if (!records.length) {
          const headers = Object.keys(rows[0] || {}).join('، ');
          throw new Error(`لا توجد صفوف صالحة. تأكد من عمود الجوال. الأعمدة التي قرأها النظام: ${headers || 'لم يتم التعرف على أعمدة'}`);
        }

        const inserted = await App.rpcInBatches('insert_campaign_targets', records);

        const shouldRecalc = localStorage.getItem(CAMPAIGN_RECALC_KEY) === '1';
        if (shouldRecalc) {
          dz.innerHTML = '<div class="spinner-x spinner-dark" style="margin:0 auto .75rem;width:28px;height:28px"></div><div style="font-weight:700">تم الحفظ... جارٍ تحديث ملفات متبرعي هذا الملف</div>';
          // تحديث تزايدي: أرقام المستهدفين في هذا الملف فقط
          await App.rebuildDonorsForPhones([...filePhones], ({ processed, total, remaining }) => {
            dz.innerHTML = `<div class="spinner-x spinner-dark" style="margin:0 auto .75rem;width:28px;height:28px"></div><div style="font-weight:700">جارٍ تحديث ملفات المتبرعين المعنيين</div><div class="muted">تمت معالجة ${App.fmtNum(processed)} من ${App.fmtNum(total)} — المتبقي ${App.fmtNum(remaining)}</div>`;
          });
        }

        App.toast(`تمت إضافة/تحديث ${inserted.toLocaleString('en-US')} سجل استهداف${skipped ? ` — متروك ${skipped.toLocaleString('en-US')}` : ''}${shouldRecalc ? ' وتحديث ملفات المتبرعين' : ''}.`, 'ok');
        if (rejected.length) showRejectedReport(rejected);
        page = 0; load();
      } catch (e) {
        App.toast(e.message || 'فشل الرفع', 'err');
      } finally {
        resetDropzone();
      }
    }

    function resetDropzone() {
      const dz = document.getElementById('dz');
      dz.innerHTML = `<i class="fa-solid fa-file-arrow-up"></i>
        <div style="font-weight:700;font-size:1.1rem">رفع ملف مستهدفين (CSV)</div>
        <div class="muted" style="font-size:.92rem;margin-top:.35rem">الأعمدة المطلوبة: الجوال، اسم الحملة، تاريخ الاستهداف — يقبل ملفات CSV فقط</div>
        <label style="display:flex;gap:.55rem;align-items:center;justify-content:center;margin-top:.9rem;cursor:pointer">
          <input type="checkbox" id="recalcAfterUpload" />
          <span class="muted">إعادة احتساب ملفات المتبرعين بعد الحفظ</span>
        </label>
        <input type="file" id="fileInput" accept=".csv" style="display:none" />`;
      wireDropzone();
    }

    async function load() {
      const area = document.getElementById('tableArea');
      area.innerHTML = '<div class="center-load"><div class="spinner-x spinner-dark" style="width:32px;height:32px"></div></div>';
      let q = App.sb.from('campaign_targets').select('*', { count:'estimated' })
        .order('target_date', { ascending:false })
        .range(page * App.PAGE_SIZE, page * App.PAGE_SIZE + App.PAGE_SIZE - 1);
      if (search) { const s = App.escFilter(search); if (s) q = q.or(`phone.ilike.%${s}%,campaign_name.ilike.%${s}%`); }
      const { data, count:c, error } = await q;
      if (error) { area.innerHTML = `<div class="empty-state">${App.esc(error.message)}</div>`; return; }
      count = c || 0;
      document.getElementById('cnt').textContent = `(${count.toLocaleString('en-US')} سجل)`;
      if (!data.length) {
        area.innerHTML = '<div class="empty-state"><i class="fa-regular fa-folder-open"></i>لا توجد سجلات استهداف بعد.</div>';
        return;
      }
      const rowsHtml = data.map(r => `<tr>
        <td dir="ltr" style="text-align:right">${App.esc(r.phone)}</td>
        <td>${App.esc(r.campaign_name) || '—'}</td>
        <td>${App.fmtDateTime(r.target_date)}</td>
      </tr>`).join('');
      const pages = Math.ceil(count / App.PAGE_SIZE);
      area.innerHTML = `
        <div class="table-wrap"><table class="data">
          <thead><tr><th>الجوال</th><th>اسم الحملة</th><th>تاريخ الاستهداف</th></tr></thead>
          <tbody>${rowsHtml}</tbody>
        </table></div>
        ${pagerHtml(pages)}`;
      wirePager(pages);
    }

    function pagerHtml(pages) {
      if (pages <= 1) return '';
      return `<div class="pager">
        <button class="btn-x btn-ghost btn-sm" id="prev" ${page === 0 ? 'disabled' : ''}><i class="fa-solid fa-chevron-right"></i> السابق</button>
        <span class="muted">صفحة ${page + 1} من ${pages}</span>
        <button class="btn-x btn-ghost btn-sm" id="next" ${page + 1 >= pages ? 'disabled' : ''}>التالي <i class="fa-solid fa-chevron-left"></i></button>
      </div>`;
    }
    function wirePager(pages) {
      document.getElementById('prev')?.addEventListener('click', () => { if (page > 0) { page--; load(); } });
      document.getElementById('next')?.addEventListener('click', () => { if (page + 1 < pages) { page++; load(); } });
    }

    function showRejectedReport(rejected) {
      const back = document.createElement('div');
      back.className = 'modal-back';
      const preview = rejected.slice(0, 100).map(r => `
        <tr>
          <td dir="ltr" style="text-align:right">${App.esc(r['الجوال كما ورد'])}</td>
          <td>${App.esc(r['اسم الحملة'])}</td>
          <td>${App.esc(r['سبب الرفض'])}</td>
        </tr>`).join('');
      back.innerHTML = `
        <div class="modal-box">
          <div class="panel-head">
            <h2 style="color:var(--c-danger)"><i class="fa-solid fa-triangle-exclamation"></i> أرقام لم تُعالَج (${rejected.length.toLocaleString('en-US')})</h2>
            <button class="btn-x btn-ghost btn-sm" id="rjClose"><i class="fa-solid fa-xmark"></i></button>
          </div>
          <div class="panel-body" style="overflow:auto">
            <p class="muted" style="margin-top:0">هذه الأرقام غير صالحة ولم تُضَف.${rejected.length > 100 ? ' (عرض أول 100 — التصدير يشمل الكل)' : ''}</p>
            <div class="table-wrap"><table class="data">
              <thead><tr><th>الجوال كما ورد</th><th>اسم الحملة</th><th>سبب الرفض</th></tr></thead>
              <tbody>${preview}</tbody>
            </table></div>
          </div>
          <div class="panel-head" style="border-top:1px solid var(--c-line);border-bottom:none;justify-content:flex-end">
            <button class="btn-x btn-gold" id="rjExport"><i class="fa-solid fa-file-csv"></i> تصدير قائمة المرفوضة CSV</button>
          </div>
        </div>`;
      document.body.appendChild(back);
      back.addEventListener('click', (e) => { if (e.target === back) back.remove(); });
      document.getElementById('rjClose').addEventListener('click', () => back.remove());
      document.getElementById('rjExport').addEventListener('click', () => {
        App.downloadCsv(`أرقام-مرفوضة-حملات-${new Date().toISOString().slice(0,10)}.csv`, rejected);
      });
    }
  </script>
</body>
</html>
