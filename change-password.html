<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تغيير كلمة المرور | ولاء</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <div id="shell"></div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4"></script>
  <script src="assets/config.js"></script>
  <script src="assets/app.js"></script>
  <script>
    (async()=>{
      const session=await App.initShell('change-password.html'); if(!session)return;
      document.getElementById('mainArea').innerHTML=`<div class="page-head"><div><h1>تغيير كلمة المرور</h1><p>غيّر كلمة المرور المؤقتة بعد أول تسجيل دخول.</p></div></div>
        <section class="panel" style="max-width:520px;padding:1.4rem"><form id="passwordForm">
          <label class="lbl">كلمة المرور الجديدة</label><input id="password" class="field" type="password" minlength="10" required dir="ltr">
          <label class="lbl" style="margin-top:.8rem">تأكيد كلمة المرور</label><input id="confirmPassword" class="field" type="password" minlength="10" required dir="ltr">
          <button class="btn-x" style="margin-top:1rem">حفظ كلمة المرور</button>
        </form></section>`;
      document.getElementById('passwordForm').onsubmit=async e=>{
        e.preventDefault(); const p=document.getElementById('password').value; const c=document.getElementById('confirmPassword').value;
        if(p!==c){App.toast('كلمتا المرور غير متطابقتين','err');return;}
        const {error}=await App.sb.auth.updateUser({password:p});
        if(error){App.toast(error.message,'err');return;} App.toast('تم تغيير كلمة المرور');
      };
    })();
  </script>
</body>
</html>
